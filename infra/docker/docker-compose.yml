version: "3.9"

services:
  postgres:
    image: postgres:15
    container_name: kagaya-postgres
    restart: always
    environment:
      POSTGRES_USER: kagaya
      POSTGRES_PASSWORD: kagaya_dev
      POSTGRES_DB: kagaya
    ports:
      - "5432:5432"
    volumes:
      - kagaya_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: kagaya-redis
    ports:
      - "6379:6379"

volumes:
  kagaya_data: